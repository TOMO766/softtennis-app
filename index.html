<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soft Tennis AI</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#1f7a4c;
touch-action:none;
}

.controls{
padding:10px;
background:#1e293b;
}

.slider{
width:80%;
}

</style>

</head>

<body>

<h2>ソフトテニス戦術AI</h2>

<canvas id="court" width="380" height="560"></canvas>

<div class="controls">

打球角度  
<br>

<input type="range" id="angle" min="10" max="70" value="25" class="slider">

<p id="angleText">25°</p>

<p id="prob"></p>

</div>

<script>

const canvas=document.getElementById("court")
const ctx=canvas.getContext("2d")

let hitX=190
let hitY=80
let angle=25

const slider=document.getElementById("angle")

slider.oninput=function(){

angle=this.value
document.getElementById("angleText").innerText=angle+"°"

draw()

}

function draw(){

ctx.clearRect(0,0,380,560)

ctx.strokeStyle="white"
ctx.lineWidth=2

ctx.strokeRect(30,30,320,500)

ctx.beginPath()
ctx.moveTo(190,30)
ctx.lineTo(190,530)
ctx.stroke()

let rad=angleMath.PI/180
let length=450

let leftX=hitX-Math.tan(rad)length
let rightX=hitX+Math.tan(rad)length

ctx.fillStyle="rgba(255,180,0,0.25)"

ctx.beginPath()
ctx.moveTo(hitX,hitY)
ctx.lineTo(leftX,530)
ctx.lineTo(rightX,530)
ctx.closePath()
ctx.fill()

let frontX=(hitX+190)/2
let frontY=280

ctx.fillStyle="yellow"

ctx.beginPath()
ctx.arc(frontX,frontY,10,0,Math.PI2)
ctx.fill()

let backX=190+(hitX-190)0.4
let backY=480

ctx.fillStyle="cyan"

ctx.beginPath()
ctx.arc(backX,backY,10,0,Math.PI2)
ctx.fill()

let enemyFrontX=190-(hitX-190)0.3
let enemyFrontY=200

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(enemyFrontX,enemyFrontY,10,0,Math.PI2)
ctx.fill()

let enemyBackX=hitX
let enemyBackY=80

ctx.fillStyle="violet"

ctx.beginPath()
ctx.arc(enemyBackX,enemyBackY,10,0,Math.PI2)
ctx.fill()

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(hitX,hitY,12,0,Math.PI2)
ctx.fill()

let diff=(hitX-190)/190

let cross=50+(diff35)
let straight=40-(diff35)
let lob=10

document.getElementById("prob").innerHTML=

"クロス "+Math.round(cross)+"% | "+
"ストレート "+Math.round(straight)+"% | "+
"ロブ "+lob+"%"

}

canvas.addEventListener("touchmove",(e)=>{

let rect=canvas.getBoundingClientRect()

hitX=e.touches[0].clientX-rect.left

if(hitX<40)hitX=40
if(hitX>340)hitX=340

draw()

})

draw()

</script>

</body>
</html>
